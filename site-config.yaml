# --- About Section ---
about:
  enabled: true
  title: "About Me"
  bio: |
    A technology enthusiast working to solve real-world problems, who enjoys connecting the dots — be it ideas from different disciplines, people from different teams, or applications from different industries.

    Kaggle 3X Expert with a keen focus on building accurate, value-generating models that are scalable. Passionate about search-based systems — I love to extract knowledge & insights from huge and complex data sets.

    In my undergraduate studies, I took on various leadership roles, including the development of a chess-playing robotic arm, coordinating institute-wide technical events, and leading the robotics club.
  interests:
    - "Search & Information Retrieval"
    - "Multilingual NLP"
    - "Large Language Models"
    - "Retrieval Augmented Generation"
    - "Machine Learning at Scale"
  education:
    - degree: "B.Tech in ICT"
      institution: "Pandit Deendayal Energy University (PDEU)"
      year: "2021"

# --- Experience Section ---
experience:
  enabled: true
  title: "Experience"
  positions:
    - role: "Data Scientist"
      company: "Embibe"
      companyUrl: ""
      logo: "/media/icons/brands/embibe.svg"
      location: "Bengaluru"
      startDate: "Sep 2021"
      endDate: "Present"
      highlights:
        - title: "Retrieval Augmented Generation (RAG)"
          description: "Developed RAG pipelines for search and chatbot applications — retrieving academic content with ontology information and dynamically selecting prompts for contextually relevant LLM responses."
        - title: "Multilingual Semantic Search"
          description: "Fine-tuned MiniLM (SBERT) for semantic similarity in academic/Indian domains, improving search retrieval by 8%. Implemented LambdaMART re-ranking, NVIDIA Triton Inference Server integration, and vector database hybrid search. Built search in 11 Indic languages using LABSE."
        - title: "Entity Extraction (NER)"
          description: "Built end-to-end Solr-based Entity Detection Service using tagger request handler with NLP analyzers (stemmer, stopwords, synonyms, lemmatizer). Core service for highlighting academic entities across client products."
        - title: "Query Understanding"
          description: "Developed query understanding and expansion modules enabling mixed-language search (English + Indic). Built search feedback pipeline using Gradio for SME validation."

    - role: "Machine Learning Engineer"
      company: "Intellica.ai"
      companyUrl: "https://www.intellica.ai/"
      logo: "/media/icons/brands/intellica.svg"
      location: "Ahmedabad"
      startDate: "Nov 2020"
      endDate: "Sep 2021"
      highlights:
        - title: "Conversational AI"
          description: "Built real-time telephonic conversational-AI system for interview pre-screening. Improved speech-to-text pipeline for Indian English accent using transfer learning on DeepSpeech."
        - title: "Montreal Cognitive Assessment"
          description: "Developed microservices for MoCA evaluation — computer vision-based drawing evaluation and NLP-based context answer evaluation system."

    - role: "Advisor"
      company: "Cretus — Robotics & Automation Club, PDEU"
      companyUrl: "https://www.linkedin.com/company/cretus/"
      logo: "/media/icons/brands/cretus.svg"
      location: "Gandhinagar"
      startDate: "Jul 2018"
      endDate: "Jul 2021"
      highlights:
        - title: "Leadership"
          description: "Held positions as committee member, event management head, and advisor. Managed robotics events with Arduino, Raspberry Pi, and various sensors. Oversaw organization budget and inventory management."


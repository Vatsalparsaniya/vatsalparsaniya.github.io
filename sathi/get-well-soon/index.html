<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>🐱 Get Well Soon 💕</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@500;700&family=Quicksand:wght@400;600&display=swap" rel="stylesheet" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      touch-action: none;
      -webkit-user-select: none;
      user-select: none;
    }
    body {
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: linear-gradient(180deg, #fff8f0 0%, #fff0f3 35%, #fce8f4 65%, #f5e6ff 100%);
      font-family: 'Quicksand', sans-serif;
      color: #5a4a4a;
      text-align: center;
      padding: 1.5rem;
      position: relative;
    }

    /* Soft animated background circles */
    .bg-circle {
      position: fixed;
      border-radius: 50%;
      opacity: 0.25;
      filter: blur(40px);
      pointer-events: none;
      z-index: 0;
    }
    .bg-circle:nth-child(1) {
      width: 200px; height: 200px;
      background: #ffcce0;
      top: -40px; left: -40px;
      animation: drift 10s ease-in-out infinite;
    }
    .bg-circle:nth-child(2) {
      width: 150px; height: 150px;
      background: #c8b6ff;
      bottom: 10%; right: -30px;
      animation: drift 13s ease-in-out infinite reverse;
    }
    .bg-circle:nth-child(3) {
      width: 120px; height: 120px;
      background: #ffd6a5;
      top: 40%; left: 60%;
      animation: drift 11s ease-in-out infinite 2s;
    }

    .container {
      z-index: 10;
      position: relative;
      animation: fadeIn 1.2s ease;
    }

    h1 {
      font-family: 'Dancing Script', cursive;
      font-size: clamp(2.5rem, 10vw, 3.5rem);
      color: #e8788a;
      margin-bottom: 0.4rem;
      line-height: 1.2;
    }

    .subtitle {
      font-size: clamp(0.85rem, 3.5vw, 1rem);
      color: #b08a8a;
      margin-bottom: 1.2rem;
    }

    /* Main cat area */
    .cat-stage {
      position: relative;
      width: clamp(200px, 60vw, 280px);
      height: clamp(200px, 60vw, 280px);
      margin: 0 auto 1rem;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .main-cat {
      width: 65%;
      height: auto;
      animation: snooze 4s ease-in-out infinite;
      filter: drop-shadow(0 8px 20px rgba(232, 120, 138, 0.15));
      z-index: 2;
      position: relative;
    }

    /* Orbiting cats around the main cat */
    .orbit-cat {
      position: absolute;
      width: clamp(45px, 12vw, 60px);
      height: auto;
      animation-timing-function: linear;
      animation-iteration-count: infinite;
      filter: drop-shadow(0 3px 8px rgba(0,0,0,0.08));
    }

    .orbit-cat:nth-child(2) { animation: orbit1 8s linear infinite; }
    .orbit-cat:nth-child(3) { animation: orbit2 10s linear infinite; }
    .orbit-cat:nth-child(4) { animation: orbit3 12s linear infinite; }
    .orbit-cat:nth-child(5) { animation: orbit4 9s linear infinite; }

    .message {
      font-size: clamp(0.9rem, 3.5vw, 1.05rem);
      color: #9a7b7b;
      line-height: 1.7;
      margin-bottom: 1rem;
    }

    .tap-hint {
      font-size: clamp(0.75rem, 2.8vw, 0.85rem);
      color: #c4a0a0;
      animation: pulse 2s ease-in-out infinite;
      margin-top: 0.5rem;
    }

    /* Paw prints that appear on tap */
    .paw {
      position: fixed;
      font-size: 1.4rem;
      pointer-events: none;
      z-index: 100;
      animation: pawPop 1.5s ease-out forwards;
    }

    /* Spawned cat on tap */
    .spawn-cat {
      position: fixed;
      pointer-events: none;
      z-index: 50;
      animation: spawnFloat 3s ease-out forwards;
    }
    .spawn-cat img {
      width: clamp(40px, 10vw, 55px);
      height: auto;
    }

    /* Floating hearts on tap */
    .tap-heart {
      position: fixed;
      pointer-events: none;
      z-index: 90;
      animation: heartPop 2s ease-out forwards;
    }

    /* Ambient floating hearts */
    .ambient-hearts {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      pointer-events: none;
      z-index: 1;
      overflow: hidden;
    }
    .ambient-heart {
      position: absolute;
      opacity: 0;
      animation: ambientFloat 9s ease-in infinite;
    }
    .ambient-heart:nth-child(1) { left: 8%; animation-delay: 0s; font-size: 0.9rem; }
    .ambient-heart:nth-child(2) { left: 25%; animation-delay: 2.5s; font-size: 0.7rem; }
    .ambient-heart:nth-child(3) { left: 50%; animation-delay: 5s; font-size: 1rem; }
    .ambient-heart:nth-child(4) { left: 75%; animation-delay: 1.5s; font-size: 0.8rem; }
    .ambient-heart:nth-child(5) { left: 90%; animation-delay: 4s; font-size: 0.7rem; }

    /* Keyframes */
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(15px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @keyframes snooze {
      0%, 100% { transform: scale(1) rotate(0deg); }
      30% { transform: scale(1.02) rotate(0.5deg); }
      70% { transform: scale(0.98) rotate(-0.5deg); }
    }

    @keyframes drift {
      0%, 100% { transform: translate(0, 0) scale(1); }
      33% { transform: translate(20px, 15px) scale(1.1); }
      66% { transform: translate(-15px, 20px) scale(0.9); }
    }

    @keyframes pulse {
      0%, 100% { opacity: 0.6; transform: scale(1); }
      50% { opacity: 1; transform: scale(1.05); }
    }

    /* Orbiting paths - elliptical for depth */
    @keyframes orbit1 {
      0%   { transform: rotate(0deg) translateX(clamp(80px, 22vw, 110px)) rotate(0deg) scale(0.9); }
      25%  { transform: rotate(90deg) translateX(clamp(80px, 22vw, 110px)) rotate(-90deg) scale(1); }
      50%  { transform: rotate(180deg) translateX(clamp(80px, 22vw, 110px)) rotate(-180deg) scale(1.1); }
      75%  { transform: rotate(270deg) translateX(clamp(80px, 22vw, 110px)) rotate(-270deg) scale(1); }
      100% { transform: rotate(360deg) translateX(clamp(80px, 22vw, 110px)) rotate(-360deg) scale(0.9); }
    }

    @keyframes orbit2 {
      0%   { transform: rotate(90deg) translateX(clamp(90px, 25vw, 120px)) rotate(-90deg) scale(1); }
      25%  { transform: rotate(180deg) translateX(clamp(90px, 25vw, 120px)) rotate(-180deg) scale(0.85); }
      50%  { transform: rotate(270deg) translateX(clamp(90px, 25vw, 120px)) rotate(-270deg) scale(1); }
      75%  { transform: rotate(360deg) translateX(clamp(90px, 25vw, 120px)) rotate(-360deg) scale(1.1); }
      100% { transform: rotate(450deg) translateX(clamp(90px, 25vw, 120px)) rotate(-450deg) scale(1); }
    }

    @keyframes orbit3 {
      0%   { transform: rotate(180deg) translateX(clamp(70px, 20vw, 100px)) rotate(-180deg) scale(1.05); }
      25%  { transform: rotate(270deg) translateX(clamp(70px, 20vw, 100px)) rotate(-270deg) scale(0.9); }
      50%  { transform: rotate(360deg) translateX(clamp(70px, 20vw, 100px)) rotate(-360deg) scale(1); }
      75%  { transform: rotate(450deg) translateX(clamp(70px, 20vw, 100px)) rotate(-450deg) scale(1.1); }
      100% { transform: rotate(540deg) translateX(clamp(70px, 20vw, 100px)) rotate(-540deg) scale(1.05); }
    }

    @keyframes orbit4 {
      0%   { transform: rotate(270deg) translateX(clamp(85px, 23vw, 115px)) rotate(-270deg) scale(0.95); }
      25%  { transform: rotate(360deg) translateX(clamp(85px, 23vw, 115px)) rotate(-360deg) scale(1.05); }
      50%  { transform: rotate(450deg) translateX(clamp(85px, 23vw, 115px)) rotate(-450deg) scale(0.9); }
      75%  { transform: rotate(540deg) translateX(clamp(85px, 23vw, 115px)) rotate(-540deg) scale(1); }
      100% { transform: rotate(630deg) translateX(clamp(85px, 23vw, 115px)) rotate(-630deg) scale(0.95); }
    }

    @keyframes pawPop {
      0%   { opacity: 1; transform: scale(0.5) rotate(0deg); }
      50%  { opacity: 0.8; transform: scale(1.2) rotate(10deg); }
      100% { opacity: 0; transform: scale(0.8) translateY(-30px) rotate(-10deg); }
    }

    @keyframes spawnFloat {
      0%   { opacity: 0; transform: scale(0.3) translateY(0); }
      20%  { opacity: 1; transform: scale(1.1) translateY(-10px); }
      40%  { transform: scale(1) translateY(-25px); }
      100% { opacity: 0; transform: scale(0.6) translateY(-120px) rotate(15deg); }
    }

    @keyframes heartPop {
      0%   { opacity: 0; transform: scale(0) translateY(0); }
      20%  { opacity: 1; transform: scale(1.3) translateY(-10px); }
      100% { opacity: 0; transform: scale(0.5) translateY(-80px); }
    }

    @keyframes ambientFloat {
      0%   { opacity: 0; transform: translateY(100vh); }
      10%  { opacity: 0.5; }
      90%  { opacity: 0.4; }
      100% { opacity: 0; transform: translateY(-10vh); }
    }
  </style>
</head>
<body>
  <!-- Background blobs -->
  <div class="bg-circle"></div>
  <div class="bg-circle"></div>
  <div class="bg-circle"></div>

  <!-- Ambient floating hearts -->
  <div class="ambient-hearts">
    <span class="ambient-heart">💗</span>
    <span class="ambient-heart">🩷</span>
    <span class="ambient-heart">💕</span>
    <span class="ambient-heart">💗</span>
    <span class="ambient-heart">🩷</span>
  </div>

  <div class="container">
    <!-- Cat stage - main cat with orbiting friends -->
    <div class="cat-stage">
      <img class="main-cat" src="sleeping-cat.gif" alt="sleeping kitty" />
      <img class="orbit-cat" src="cat-nap.gif" alt="" />
      <img class="orbit-cat" src="cat-hearts.gif" alt="" />
      <img class="orbit-cat" src="cat-love.gif" alt="" />
      <img class="orbit-cat" src="kawaii-cats.gif" alt="" />
    </div>

    <h1>Get Well Soon 🩹</h1>
    <p class="subtitle">~ for you, with love ~</p>

    <p class="message">
      These little ones are orbiting around you,<br />
      sending all the warm cuddles<br />
      until you're feeling purrfect again 🐾
    </p>

    <p class="tap-hint">✨ tap anywhere for surprises ✨</p>
  </div>

  <script>
    const catGifs = ['cat-nap.gif', 'cat-hearts.gif', 'cat-love.gif', 'kawaii-cats.gif', 'cat-heart.gif', 'get-well-cat.gif'];
    const hearts = ['💗', '🩷', '💕', '❤️‍🩹', '🐾', '✨', '💖'];
    let tapCount = 0;

    function spawnPaw(x, y) {
      const paw = document.createElement('div');
      paw.className = 'paw';
      paw.textContent = '🐾';
      paw.style.left = (x - 12) + 'px';
      paw.style.top = (y - 12) + 'px';
      // Random slight rotation
      paw.style.transform = `rotate(${Math.random() * 40 - 20}deg)`;
      document.body.appendChild(paw);
      setTimeout(() => paw.remove(), 1500);
    }

    function spawnCat(x, y) {
      const cat = document.createElement('div');
      cat.className = 'spawn-cat';
      const img = document.createElement('img');
      img.src = catGifs[Math.floor(Math.random() * catGifs.length)];
      img.alt = '';
      cat.appendChild(img);
      cat.style.left = (x - 25) + 'px';
      cat.style.top = (y - 25) + 'px';
      document.body.appendChild(cat);
      setTimeout(() => cat.remove(), 3000);
    }

    function spawnHeart(x, y) {
      const heart = document.createElement('div');
      heart.className = 'tap-heart';
      heart.textContent = hearts[Math.floor(Math.random() * hearts.length)];
      heart.style.fontSize = (Math.random() * 0.8 + 0.8) + 'rem';
      // Offset randomly around tap point
      const offsetX = (Math.random() - 0.5) * 60;
      const offsetY = (Math.random() - 0.5) * 30;
      heart.style.left = (x + offsetX) + 'px';
      heart.style.top = (y + offsetY) + 'px';
      document.body.appendChild(heart);
      setTimeout(() => heart.remove(), 2000);
    }

    function handleTap(x, y) {
      tapCount++;

      // Always spawn paw print
      spawnPaw(x, y);

      // Spawn 2-4 hearts
      const heartCount = Math.floor(Math.random() * 3) + 2;
      for (let i = 0; i < heartCount; i++) {
        setTimeout(() => spawnHeart(x, y), i * 100);
      }

      // Every 2nd tap, spawn a cat
      if (tapCount % 2 === 0) {
        spawnCat(x, y);
      }
    }

    // Touch events for mobile
    document.addEventListener('touchstart', (e) => {
      const touch = e.touches[0];
      handleTap(touch.clientX, touch.clientY);
    }, { passive: true });

    // Also support mouse for testing
    document.addEventListener('click', (e) => {
      handleTap(e.clientX, e.clientY);
    });

    // Touch move - leave paw trail
    let lastTrailTime = 0;
    document.addEventListener('touchmove', (e) => {
      const now = Date.now();
      if (now - lastTrailTime < 200) return; // throttle
      lastTrailTime = now;
      const touch = e.touches[0];
      spawnPaw(touch.clientX, touch.clientY);
    }, { passive: true });
  </script>
</body>
</html>

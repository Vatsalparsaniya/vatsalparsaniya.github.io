function decodeGrid(b64, size) {
  const bin = atob(b64);
  const grid = [];
  for (let r = 0; r < size; r++) {
    const row = [];
    for (let c = 0; c < size; c++) row.push(bin.charCodeAt(r * size + c));
    grid.push(row);
  }
  return grid;
}
const cat = decodeGrid(GRID_B64, GRID);

// Center offset
const OX = Math.floor((vw - GRID * CELL) / 2);
const OY = Math.floor((vh - GRID * CELL) / 2);

function drawPaper() {
  ctx.fillStyle = '#4ba5cd';
  ctx.fillRect(0, 0, vw, vh);
  // Grid lines
  ctx.lineWidth = 0.3;
  ctx.strokeStyle = 'rgba(160,175,195,0.22)';
  const startX = OX % CELL;
  const startY = OY % CELL;
  for (let x = startX; x <= vw; x += CELL) {
    ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, vh); ctx.stroke();
  }
  for (let y = startY; y <= vh; y += CELL) {
    ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(vw, y); ctx.stroke();
  }
}

// Animation: reveal row by row from bottom
let revealed = 0;
let lastTime = 0;
const SPEED = 4; // rows per frame
let done = false;

function render(now) {
  if (!done && now - lastTime > 16) {
    revealed += SPEED;
    lastTime = now;
    if (revealed >= GRID) {
      revealed = GRID;
      done = true;
    }
  }

  drawPaper();

  // Draw from bottom up
  const startRow = GRID - revealed;
  for (let row = startRow; row < GRID; row++) {
    for (let col = 0; col < GRID; col++) {
      const v = cat[row][col];
      if (v === 0) continue;
      ctx.fillStyle = PAL[v];
      ctx.fillRect(OX + col * CELL, OY + row * CELL, CELL, CELL);
    }
  }

  requestAnimationFrame(render);
}

drawPaper();
requestAnimationFrame((t) => { lastTime = t; render(t); });
